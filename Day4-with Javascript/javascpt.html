        <!--Function - Without Parameter without Argument!-->
    <h2 >Add Two Numbers</h2>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <br><br>
    <button onclick="addNumbers()">Add</button>
    <h2 id="result"></h2>

        <!--Function - With !--> 
    <h2>Subtract Two Numbers</h2>
    <input type="number" id="num3" placeholder="Enter first number">
    <input type="number" id="num4" placeholder="Enter second number">
    <br><br>
    <button onclick="subNumbers()"> Subtract</button>
    <h2 id="result1"></h2>
    <h2>Checking if else </h2>
    <button onclick="handleclick()">ClickMe</button>
    <p style="color:red;" id="res"></p>
    <h2>Check Odd or Even:</h2>
    <input type="number" id="num5" placeholder="Enter first number">
    <input type="number" id="num6" placeholder="Enter second number">
    <br><br>
    <button onclick="OddEven()">Odd or Even</button>
    
    <script>
    function addNumbers(){
        let n1 = document.getElementById("num1").value;
        let n2 = document.getElementById("num2").value;
        let sum = Number(n1) + Number(n2);
        document.getElementById("result").textContent = "Addition is:"+sum;
    }
    function subNumbers(){
        let n3= document.getElementById("num3").value;
        let n4 = document.getElementById("num4").value;
        let diff = Number(n3)-Number(n4);
        document.getElementById("result1").textContent="Subtraction is:"+diff;
    }
    
    function handleclick(){
        let x=45
    if(x>=10 && x<=50){
        console.log("Its between 10 and 50")
        document.getElementById("res").textContent="Its between 10 and 50";
    }
    else if(x>50 && x<=100){
        console.log("Its between 50 and 100")
        document.getElementById("res").textContent="Its between 50 and 100";

    }
    else if(x>100){
        console.log("Greater than 100")
        document.getElementById("res").textContent="Greater than 100";
    }
}
    function OddEven(){
        let n5=document.getElementById("num5").value;
        let n6=document.getElementById("num6").value;
        let sum = Number(n5)+Number(n6);
        let n7 =0;
        while(sum!=0){
            
            n7+=sum%10;
            sum=Math.floor(sum/10);

        }
        if(n7%2==0){
        console.log(n7+" is even")
        }
        else{
            console.log(n7+" is odd")
        }

    }
